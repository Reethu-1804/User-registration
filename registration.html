<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>event registration form</title>
<style>
body{
font-family: Arial, sans-serif;
background: #F2F2F2;
display: flex;
justify-content: center;
padding: 50px;
}
form{
background: white;
padding:  20px 30px;
box-shadow: 0 0 10px rgba(0,0,0,0.1)
width: 30px;
}
input,select,textarea{
width: 100%;
padding: 10px;
margin-top: 10px;
margin-bottom: 15px;
border: 1px solid #ccc;
border-radius: 5px;
}
button{
background: #4CAF50;
color: white;
padding: 10px;
border-radius: 5px;
cursor: pointer;
width: 100%;
}
button:hover{
background: #45a049;
}
h2{
text-align: center;
}
</style>
</head>
<body>
<form action="/submit" method="POST">
<h2>EVENT REGISTRATION</h2><br>
<label for="name">FULL NAME</label>
<input type="text" id="name" name="name" required><br>
<label for="email">EMAIL ADDRESS</label>
<input type="email" id="email" name="email" required><br>
<label for="phone">PHONE NUMBER</label>
<input type="tel" id="phone" name="phone" required><br>
<label for="event">CHOOSE EVENT</label>
<select id="event" name="event"><br>
<option value="coding">CODING CONTEST</option><br>
<option value="debate">DEBATE</option><br>
<option value="music">MUSIC SHOW</option><br>
</select><br>
<button type="submit">REGISTER</button>
</form>
</body>
</html>
